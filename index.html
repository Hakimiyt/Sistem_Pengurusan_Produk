<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Produk</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <h1>Sistem Pengurusan Produk</h1>

    <form id="productForm">
        <input type="text" id="nama" placeholder="Nama Produk" required>
        <input type="text" id="kategori" placeholder="Kategori" required>
        <input type="number" id="harga" placeholder="Harga" required>
        <button type="submit">Tambah Produk</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga (RM)</th>
                <th>Tindakan</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>

    <script src="js/app.js"></script>
</body>
</html>
